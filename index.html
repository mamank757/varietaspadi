<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Padi AI - PPL Bola (Dark Mode)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; } /* Slate 900 */
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-gray-100">

<div class="max-w-2xl mx-auto">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-green-400 flex justify-center items-center gap-2">
            <span>🌾</span> Katalog Padi Digital
        </h1>
        <p class="text-gray-400 font-medium">Asisten AI Penyuluh Pertanian</p>
    </div>

    <div class="bg-slate-800 p-6 rounded-2xl shadow-2xl border-b-4 border-green-500 mb-6">
        <label class="block text-sm font-bold text-green-400 mb-2 uppercase tracking-wide">Cari Varietas Padi:</label>
        <div class="flex gap-2">
            <input id="input-varietas" type="text"
                placeholder="Contoh: Inpari 32, Ciherang..."
                class="flex-1 p-3 bg-slate-700 border-2 border-slate-600 rounded-xl text-white focus:border-green-400 focus:ring-0 outline-none transition-all placeholder:text-gray-500">
            
            <button onclick="cariVarietas()" id="btn-cari"
                class="bg-green-500 text-slate-900 px-5 py-3 rounded-xl font-bold hover:bg-green-400 active:scale-95 transition-all shadow-lg shadow-green-500/20">
                <i class="fas fa-microchip"></i>
            </button>
        </div>
        <p class="text-[10px] text-gray-500 mt-3 italic">*Data diolah secara otomatis oleh AI</p>
    </div>

    <div id="loading" class="hidden text-center py-10">
        <div class="animate-spin h-10 w-10 border-4 border-green-400 border-t-transparent rounded-full mx-auto"></div>
        <p class="mt-3 text-green-400 font-semibold animate-pulse">Menganalisis data varietas...</p>
    </div>

    <div id="hasil" class="hidden animate-in fade-in zoom-in duration-300">
        <div class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
            
            <div class="bg-gradient-to-r from-green-600 to-emerald-700 text-white p-5">
                <h2 id="nama" class="text-2xl font-black tracking-tight">-</h2>
                <p class="text-green-100 text-[10px] uppercase font-bold mt-1 tracking-widest">Spesifikasi Teknis Varietas</p>
            </div>

            <div class="p-6 grid grid-cols-2 gap-6">
                <div class="space-y-1">
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">🌱 Umur Tanaman</p>
                    <p id="umur" class="text-gray-200 font-semibold">-</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">📈 Potensi Hasil</p>
                    <p id="potensi" class="text-gray-200 font-semibold">-</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">🛡️ Ketahanan Hama</p>
                    <p id="hama" class="text-gray-200 font-semibold">-</p>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">🍚 Tekstur Nasi</p>
                    <p id="nasi" class="text-gray-200 font-semibold">-</p>
                </div>
            </div>

            <div class="px-6 pb-6">
                <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700">
                    <p class="text-green-400 font-bold text-sm mb-2 flex items-center gap-2">
                        <i class="fas fa-lightbulb text-yellow-400"></i> Rekomendasi PPL:
                    </p>
                    <p id="saran" class="text-gray-400 text-sm italic leading-relaxed">-</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const gasUrl = "https://script.google.com/macros/s/AKfycbytunLdamazV9nrpgozS5bDMf7tJQca6tNUXil9i5-h_uMThGvI5yunvtWi2Ll2AuNCoA/exec";

document.getElementById("input-varietas").addEventListener("keypress", (e) => {
    if (e.key === "Enter") cariVarietas();
});

async function cariVarietas() {
    const input = document.getElementById("input-varietas").value.trim();
    if (!input) {
        alert("Silakan masukkan nama varietas!");
        return;
    }

    const btn = document.getElementById("btn-cari");
    const loading = document.getElementById("loading");
    const hasil = document.getElementById("hasil");

    btn.disabled = true;
    loading.classList.remove("hidden");
    hasil.classList.add("hidden");

    const promptText = `Anda adalah ahli agronomi padi. Berikan data teknis varietas: ${input}. 
    Balas HANYA dengan JSON valid tanpa teks tambahan. 
    Struktur: {"nama":"...", "umur":"...", "potensi":"...", "hama":"...", "nasi":"...", "saran":"..."}`;

    try {
        const response = await fetch(gasUrl, {
            method: "POST",
            body: JSON.stringify({ prompt: promptText }),
        });

        const data = await response.json();

        if (data.error) {
            alert("Terjadi Kendala: " + data.message);
        } else {
            document.getElementById("nama").innerText = data.nama.toUpperCase();
            document.getElementById("umur").innerText = data.umur || "-";
            document.getElementById("potensi").innerText = data.potensi || "-";
            document.getElementById("hama").innerText = data.hama || "-";
            document.getElementById("nasi").innerText = data.nasi || "-";
            document.getElementById("saran").innerText = data.saran || "-";
            hasil.classList.remove("hidden");
        }
    } catch (err) {
        console.error("Fetch Error:", err);
        alert("Gagal mengambil data. Pastikan Apps Script sudah di-deploy dengan benar.");
    } finally {
        btn.disabled = false;
        loading.classList.add("hidden");
    }
}
</script>

</body>
</html>
